<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FreshCart — Premium online grocery shopping. Fresh fruits, vegetables, dairy, bakery and more delivered to your door."
    />
    <title>FreshCart — Fresh Groceries, Delivered</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header class="header" id="main-header">
        <div class="header-inner">
          <a href="#" class="logo" id="logo-link" data-page="home">
            <span class="logo-icon">🛒</span>
            <span class="logo-text">Fresh<span class="logo-accent">Cart</span></span>
          </a>

          <div class="search-bar" id="search-bar">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input
              type="text"
              id="search-input"
              placeholder="Search fresh groceries..."
              autocomplete="off"
            />
          </div>

          <nav class="header-nav">
            <button class="nav-btn" id="nav-home" data-page="home">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
              <span>Shop</span>
            </button>
            <button class="nav-btn cart-btn" id="nav-cart" data-page="cart">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
              </svg>
              <span>Cart</span>
              <span class="cart-badge" id="cart-badge">0</span>
            </button>
            <button class="nav-btn" id="nav-orders" data-page="orders">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
              </svg>
              <span>Orders</span>
            </button>
          </nav>
        </div>
      </header>

      <!-- Main content area -->
      <main id="main-content" class="main-content"></main>

      <!-- Toast notifications -->
      <div id="toast-container" class="toast-container"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
